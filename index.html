<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>2026スポーツ少年団交歓大会 エントリー検索</title>
<style>
:root {
  --bg:#0d1426;
  --bg2:#111b33;
  --surface:#16213e;
  --surface2:#0f3460;
  --accent:#00c4ff;
  --accent2:#0077cc;
  --male:#1565c0;
  --female:#b71c6e;
  --mixed:#6d4cc2;
  --text:#e8f0fe;
  --text2:#8ca0c0;
  --border:#1e3050;
  --card-bg:#13203a;
  --radius:12px;
  --shadow:0 18px 50px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}
body{margin:0;min-height:100vh;background:
  radial-gradient(circle at 10% -10%, rgba(0,196,255,.16), transparent 32%),
  linear-gradient(180deg,#101a31 0%,var(--bg) 42%,#08101f 100%);
}
button,input,select{font:inherit}
.app{width:min(100%,440px);margin:0 auto;min-height:100vh;padding-bottom:28px}
.top{position:sticky;top:0;z-index:20;padding:12px 14px 12px;background:linear-gradient(180deg,rgba(16,28,55,.98),rgba(13,20,38,.94));backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,196,255,.14)}
.titleRow{display:flex;align-items:center;gap:10px}
.icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#3159ff);display:grid;place-items:center;box-shadow:0 0 0 1px rgba(255,255,255,.12) inset}
.icon::before{content:"";width:17px;height:17px;border-radius:5px;background:rgba(255,255,255,.92);clip-path:polygon(8% 58%,28% 42%,48% 56%,70% 39%,92% 52%,92% 74%,8% 74%)}
h1{font-size:18px;line-height:1.2;margin:0;font-weight:800}
.sub{margin:4px 0 0;color:var(--text2);font-size:11px;line-height:1.35}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px}
.stat{background:linear-gradient(180deg,rgba(22,33,62,.95),rgba(15,52,96,.72));border:1px solid var(--border);border-radius:var(--radius);padding:8px 6px;text-align:center;min-width:0}
.stat b{display:block;font-size:17px;color:#fff;line-height:1}
.stat span{display:block;margin-top:4px;font-size:10px;color:var(--text2);white-space:nowrap}
.tabs{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
.tabs::-webkit-scrollbar,.chips::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--border);background:#111f3a;color:var(--text2);border-radius:11px;padding:9px 10px;font-size:12px;font-weight:700;min-width:72px}
.tab.active{color:#fff;border-color:rgba(0,196,255,.5);background:linear-gradient(135deg,var(--accent2),#00a8e8);box-shadow:0 8px 24px rgba(0,119,204,.25)}
.main{padding:14px}
.panel{display:none}
.panel.active{display:block}
.searchBox{background:rgba(19,32,58,.88);border:1px solid var(--border);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
.searchLine{display:flex;gap:8px;align-items:center}
.search{width:100%;min-height:45px;border:1px solid #263b63;border-radius:11px;background:#0b1830;color:var(--text);padding:0 13px;outline:none}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,196,255,.12)}
.select{width:100%;border:1px solid #263b63;border-radius:11px;background:#0b1830;color:var(--text);padding:11px;outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;margin-top:10px;padding-bottom:2px}
.chip,.ghostBtn{flex:0 0 auto;border:1px solid var(--border);border-radius:999px;background:#102242;color:var(--text2);padding:8px 10px;font-size:12px;font-weight:700}
.chip.active{background:rgba(0,196,255,.16);border-color:var(--accent);color:#fff}
.ghostBtn{border-radius:11px;color:#d9ecff;background:#10203b}
.teamList{display:none;margin-top:10px;grid-template-columns:repeat(2,1fr);gap:7px}
.teamList.open{display:grid}
.muted{color:var(--text2);font-size:12px;line-height:1.45}
.sectionHead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:14px 2px 9px}
.sectionHead h2{margin:0;font-size:15px}
.list{display:grid;gap:10px}
.card{border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(180deg,rgba(19,32,58,.96),rgba(12,24,46,.96));box-shadow:0 10px 28px rgba(0,0,0,.2);overflow:hidden}
.cardBtn{width:100%;border:0;background:transparent;color:inherit;text-align:left;padding:12px;display:grid;gap:8px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.name{font-size:16px;font-weight:800;line-height:1.25}
.kana{color:var(--text2);font-size:11px;margin-top:2px}
.meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;min-height:22px;padding:3px 7px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:#0d1a33;color:var(--text2);font-size:11px;font-weight:700}
.gender{color:#fff;border:0}
.gender.female{background:linear-gradient(135deg,var(--female),#e34d91)}
.gender.male{background:linear-gradient(135deg,var(--male),#3290f2)}
.gender.mixed{background:linear-gradient(135deg,var(--mixed),#9b70ff)}
.eventRows{display:none;border-top:1px solid var(--border);padding:9px 12px 12px;background:rgba(7,16,31,.36)}
.card.open .eventRows{display:grid;gap:7px}
.eventLine{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px;border-radius:10px;background:#0e1b34;border:1px solid rgba(255,255,255,.05)}
.time{font-variant-numeric:tabular-nums;color:#fff;font-weight:800}
.miniGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.programCard{padding:12px;display:grid;gap:8px}
.programTitle{font-weight:800;line-height:1.35}
.programActions{display:flex;gap:8px;flex-wrap:wrap}
.smallBtn{border:1px solid #2b4874;background:#0e2446;color:#dcecff;border-radius:10px;padding:8px 9px;font-size:12px;font-weight:800}
.relayCard{padding:12px}
.laneWrap{display:grid;gap:10px}
.heat{border:1px solid var(--border);border-radius:var(--radius);background:#0d1c35;overflow:hidden}
.heat h3{margin:0;padding:10px 12px;background:#122545;font-size:13px}
.lane{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;padding:9px 12px;border-top:1px solid rgba(255,255,255,.06)}
.laneNo{width:28px;height:28px;border-radius:9px;background:#18365f;display:grid;place-items:center;font-size:12px;font-weight:900;color:#fff}
.empty{padding:18px;border:1px dashed #2b4268;border-radius:var(--radius);color:var(--text2);text-align:center;background:rgba(16,31,58,.5)}
.fixedTools{position:fixed;right:max(12px,calc((100vw - 440px)/2 + 12px));bottom:14px;z-index:30;display:grid;gap:8px}
.toTop{width:42px;height:42px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:linear-gradient(135deg,var(--accent2),#01b6ee);color:#fff;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.35)}
@media (max-width:360px){
  .stat span{font-size:9px}
  .tab{min-width:68px;padding:8px 8px}
  .name{font-size:15px}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="titleRow">
      <div class="icon" aria-hidden="true"></div>
      <div>
        <h1>2026スポーツ少年団交歓大会</h1>
        <p class="sub">エントリー検索 / 選手・種目・リレー・レーン予想</p>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b id="statAthletes">0</b><span>選手</span></div>
      <div class="stat"><b id="statEntries">0</b><span>個人</span></div>
      <div class="stat"><b id="statPrograms">0</b><span>種目</span></div>
      <div class="stat"><b id="statRelays">0</b><span>リレー</span></div>
    </div>
    <nav class="tabs" aria-label="表示切替">
      <button class="tab active" data-tab="athletes">選手・チーム</button>
      <button class="tab" data-tab="events">種目検索</button>
      <button class="tab" data-tab="programs">プログラム</button>
      <button class="tab" data-tab="relays">リレー</button>
      <button class="tab" data-tab="lanes">レーン予想</button>
    </nav>
  </header>
  <main class="main">
    <section id="athletes" class="panel active">
      <div class="searchBox">
        <input id="athleteSearch" class="search" type="search" placeholder="選手名・カナ・学校名・チーム名・種目で検索">
        <div class="chips" id="teamChips"></div>
        <button class="ghostBtn" id="toggleTeams" type="button">全チーム一覧を表示</button>
        <div class="teamList" id="teamList"></div>
      </div>
      <div class="sectionHead"><h2>選手一覧</h2><span class="muted" id="athleteCount"></span></div>
      <div class="list" id="athleteList"></div>
    </section>

    <section id="events" class="panel">
      <div class="searchBox">
        <div class="miniGrid">
          <select id="eventProgram" class="select"></select>
          <select id="eventGender" class="select">
            <option value="">男女すべて</option>
            <option value="女子">女子</option>
            <option value="男子">男子</option>
          </select>
        </div>
        <input id="eventSearch" class="search" type="search" placeholder="選手名・カナ・所属で絞り込み" style="margin-top:8px">
      </div>
      <div class="sectionHead"><h2>種目エントリー</h2><span class="muted" id="eventCount"></span></div>
      <div class="list" id="eventList"></div>
    </section>

    <section id="programs" class="panel">
      <div class="sectionHead"><h2>プログラム</h2><span class="muted">PDFから生成した種目一覧</span></div>
      <div class="list" id="programList"></div>
    </section>

    <section id="relays" class="panel">
      <div class="sectionHead"><h2>リレー</h2><span class="muted" id="relayCount"></span></div>
      <div class="list" id="relayList"></div>
    </section>

    <section id="lanes" class="panel">
      <div class="searchBox">
        <select id="laneProgram" class="select"></select>
        <p class="muted">8レーン想定。エントリータイム順の参考予想です。</p>
      </div>
      <div class="sectionHead"><h2>レーン予想</h2><span class="muted" id="laneCount"></span></div>
      <div class="laneWrap" id="laneList"></div>
    </section>
  </main>
</div>
<div class="fixedTools"><button class="toTop" type="button" id="toTop" aria-label="上へ戻る">↑</button></div>

const GRADE_RANK = {'中3':9,'中2':8,'中1':7,'小6':6,'小5':5,'小4':4,'小3':3,'小2':2,'小1':1,'幼0':0};
const LANE_ORDER = [4,5,3,6,2,7,1,8];
const state = {tab:'athletes', query:'', selectedTeam:'', eventProgram:'all', eventGender:'', eventQuery:'', laneProgram:1};
const $ = (id) => document.getElementById(id);
function normalize(value){
  return String(value || '').normalize('NFKC').replace(/[ぁ-ん]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)).replace(/[\s　]+/g,'').toUpperCase();
}
function genderClass(gender){ return gender === '女子' ? 'female' : gender === '男子' ? 'male' : 'mixed'; }
function gradeRank(grade){ return GRADE_RANK[grade] ?? -1; }
function timeSeconds(text){
  if(!text) return 99999;
  if(text.includes(':')){ const [m,s]=text.split(':'); return Number(m)*60 + Number(s); }
  return Number(text);
}
function athleteText(a){
  return normalize([a.name,a.kana,a.team,a.grade,a.age,...a.events.map(e => `${e.groupLabel}${e.distance}${e.stroke}${e.entryTime}`)].join(' '));
}
function sortedAthletes(items){
  return [...items].sort((a,b) => {
    const ga = a.gender === '女子' ? 0 : a.gender === '男子' ? 1 : 2;
    const gb = b.gender === '女子' ? 0 : b.gender === '男子' ? 1 : 2;
    return ga - gb || gradeRank(b.grade)-gradeRank(a.grade) || normalize(a.kana).localeCompare(normalize(b.kana),'ja') || a.no-b.no;
  });
}
function renderStats(){

function programCard(p){
  return `<article class="card"><div class="programCard">
    <div class="row"><div><div class="programTitle">No.${p.programNo} ${escapeHtml(p.title)}</div><div class="muted">予選 / ${p.entryCount}件</div></div><span class="pill gender ${genderClass(p.gender)}">${escapeHtml(p.gender)}</span></div>
    <div class="meta"><span class="pill">${escapeHtml(p.groupLabel)}</span><span class="pill">${escapeHtml(p.distance)}</span><span class="pill">${escapeHtml(p.stroke)}</span></div>
    <div class="programActions"><button class="smallBtn" data-show-event="${p.programNo}">種目を見る</button><button class="smallBtn" data-show-lane="${p.programNo}">レーン予想</button></div>
  </div></article>`;
}
function renderPrograms(){
  $('programList').innerHTML = DATA.programs.map(programCard).join('');
  document.querySelectorAll('[data-show-event]').forEach(btn => btn.addEventListener('click', () => {
    switchTab('events'); state.eventProgram = btn.dataset.showEvent; $('eventProgram').value = state.eventProgram; renderEvents();
  }));
  document.querySelectorAll('[data-show-lane]').forEach(btn => btn.addEventListener('click', () => {
    switchTab('lanes'); state.laneProgram = Number(btn.dataset.showLane); $('laneProgram').value = state.laneProgram; renderLanes();
  }));
}
function renderRelays(){
  $('relayCount').textContent = `${DATA.relays.length}件`;
  $('relayList').innerHTML = DATA.relays.map(r => `<article class="card"><div class="relayCard">
    <div class="row"><div><div class="programTitle">R${r.no} ${escapeHtml(r.team)}</div><div class="muted">${escapeHtml(r.kana)}</div></div><span class="time">${escapeHtml(r.entryTime)}</span></div>
    <div class="meta"><span class="pill gender ${genderClass(r.gender)}">${escapeHtml(r.gender)}</span><span class="pill">${escapeHtml(r.classLabel)}</span><span class="pill">${escapeHtml(r.distance)}${escapeHtml(r.relayType)}</span></div>
  </div></article>`).join('');
}
function buildHeats(program){
  const sorted = [...program.entries].sort((a,b) => timeSeconds(b.entryTime)-timeSeconds(a.entryTime));
  const heats = [];
  for(let i=0;i<sorted.length;i+=8) heats.push(sorted.slice(i,i+8));
  return heats.map((heat,index) => {
    const laneEntries = [...heat].sort((a,b) => timeSeconds(a.entryTime)-timeSeconds(b.entryTime));
    return {heatNo:index+1, entries:laneEntries.map((entry,i) => ({lane:LANE_ORDER[i], ...entry})).sort((a,b)=>a.lane-b.lane)};
  });
}
function renderLanes(){
  const program = DATA.programs.find(p => p.programNo === Number(state.laneProgram)) || DATA.programs[0];
  $('laneCount').textContent = program ? `${program.entryCount}件` : '';
  if(!program){ $('laneList').innerHTML = `<div class="empty">種目がありません</div>`; return; }
  const heats = buildHeats(program);
  $('laneList').innerHTML = heats.map(h => `<section class="heat"><h3>No.${program.programNo} ${escapeHtml(program.title)} / ${h.heatNo}組</h3>${h.entries.map(e => `<div class="lane"><span class="laneNo">${e.lane}</span><div><b>${escapeHtml(e.name)}</b><div class="muted">${escapeHtml(e.team)} / ${escapeHtml(e.grade)}</div></div><span class="time">${escapeHtml(e.entryTime)}</span></div>`).join('')}</section>`).join('');
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function switchTab(tab){
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(panel => panel.classList.toggle('active', panel.id === tab));
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
$('athleteSearch').addEventListener('input', e => { state.query = e.target.value; state.selectedTeam=''; renderTeams(); renderAthletes(); });
$('toggleTeams').addEventListener('click', () => $('teamList').classList.toggle('open'));
$('eventProgram').addEventListener('change', e => { state.eventProgram = e.target.value; renderEvents(); });
$('eventGender').addEventListener('change', e => { state.eventGender = e.target.value; renderEvents(); });
$('eventSearch').addEventListener('input', e => { state.eventQuery = e.target.value; renderEvents(); });
$('laneProgram').addEventListener('change', e => { state.laneProgram = Number(e.target.value); renderLanes(); });
$('toTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
renderStats();
renderTeams();
renderSelectors();
renderAthletes();
renderEvents();
renderPrograms();
renderRelays();
renderLanes();
</script>
</body>
</html>
